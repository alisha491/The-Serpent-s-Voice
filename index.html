                { label: '故事', id: 'section-story' },
                { label: '蛇', id: 'section-habitat' },
                { label: '蛇尺', id: 'section-ruler' },
                { label: '繪本', id: 'section-book' },
                { label: 'AR', id: 'section-ar' },
                { label: '拼圖', id: 'section-puzzle' },
                { label: '願景', id: 'section-vision' },
                { label: 'APP', id: 'section-app' }
            ];

            const toggleMenu = () => setIsMenuOpen(!isMenuOpen);
            const handleNavigation = (id) => {
                // setIsMenuOpen(false); // Keep menu open as requested
                scrollToSection(id);
            };

            return (
                <div className="relative w-full min-h-screen">
                    <Noise patternSize={230} patternScaleX={1} patternScaleY={1.2} patternRefreshInterval={4} patternAlpha={30} />
                    <div className="noise-overlay"></div>

                    {/* 開場動畫 (Loading) */}
                    <div className="intro-overlay fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
                        <img src="./它說字體3外框.png" alt="THE SERPENT'S VOICE" className="intro-text w-64 md:w-96 opacity-0" />
                    </div>

                    {/* Lanyard Menu Trigger (appears after intro) -> Replaced with Hamburger */}
                    {!showIntro && (
                        <MenuButton
                            isOpen={isMenuOpen}
                            onClick={toggleMenu}
                        />
                    )}

                    {/* Gradient Full Screen Menu */}
                    <GradientMenuOverlay
                        isOpen={isMenuOpen}
                        menuItems={menuItems}
                        onNavigate={(id) => {
                            handleNavigation(id);
                            setIsMenuOpen(false); // Close menu on navigate
                        }}
                    />

                    {/* 1. Hero (Interactive Flashlight) */}
                    <HeroSection />

                    {/* 1.5 Storytelling Section */}
                    <StorySection />

                    {/* 2. Snake Section (The 7 Snakes) */}
                    <section id="section-habitat" className="min-h-screen py-20 bg-[#13151A] border-t border-white/5 relative overflow-hidden flex items-center">

                        {/* 背景裝飾：當前蛇的環境色光暈 */}
                        <div className="absolute inset-0 transition-colors duration-1000 opacity-5"
                            style={{ backgroundColor: snakes[currentSnake].color }}></div>

                        <div className="container mx-auto px-6 z-10">
                            <div className="flex flex-col md:flex-row items-stretch justify-center gap-12">

                                {/* 左側：控制與資訊 (Scrollable Info) */}
                                <ScrollReveal className="w-full md:w-5/12 space-y-8 order-2 md:order-1 flex flex-col justify-center">
                                    <div key={currentSnake} className="animate-pulse">
                                        <span className="text-xs font-mono border border-white/30 px-3 py-1 rounded-full text-white/60">
                                            NO.0{currentSnake + 1}
                                        </span>
                                    </div>

                                    <div key={`text-${currentSnake}`}>
                                        <h2 className="text-4xl md:text-6xl font-bold text-white mb-2 animate-slide-up" style={{ animationDelay: '0.1s' }}>
                                            {snakes[currentSnake].name}
                                        </h2>
                                        <p className="text-sm font-mono text-white/40 tracking-widest uppercase mb-6 animate-slide-up" style={{ animationDelay: '0.2s' }}>
                                            {snakes[currentSnake].eng}
                                        </p>

                                        {/* 蛇的自我介紹 (Dialogue) */}
                                        {snakes[currentSnake].intro && (
                                            <div className="bg-white/5 backdrop-blur-md rounded-xl p-4 border-l-4 border-[color:var(--snake-color)] mb-6 animate-slide-up" style={{ '--snake-color': snakes[currentSnake].color, animationDelay: '0.3s' }}>
                                                <p className="text-gray-300 leading-relaxed text-sm italic">
                                                    "{snakes[currentSnake].intro}"
                                                </p>
                                            </div>
                                        )}

                                        {/* 觀察檔案 & 戰力分析 (Tabs or Grid) */}
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

                                            {/* 檔案 */}
                                            <div className="space-y-4 animate-slide-up" style={{ animationDelay: '0.4s' }}>
                                                {snakes[currentSnake].features && (
                                                    <div className="text-sm text-gray-400 space-y-2">
                                                        <h4 className="text-white font-bold border-b border-white/10 pb-1">🔎 觀察檔案</h4>
                                                        <p><span className="text-white/60">外號：</span>{snakes[currentSnake].features.nickname}</p>
                                                        <p><span className="text-white/60">花紋：</span>{snakes[currentSnake].features.pattern}</p>
                                                        <p><span className="text-white/60">特徵：</span>{snakes[currentSnake].features.body}</p>
                                                    </div>
                                                )}

                                                <div className="flex items-center gap-2 text-white/70 text-xs mt-4">
                                                    <MapPin size={14} />
                                                    <span>{snakes[currentSnake].habitat}</span>
                                                </div>
                                            </div>

                                            {/* 雷達圖 */}
                                            <div className="flex flex-col items-center animate-slide-up" style={{ animationDelay: '0.5s' }}>
                                                <RadarChart
                                                    stats={snakes[currentSnake].stats}
                                                    labels={snakes[currentSnake].statLabels}
                                                    color={snakes[currentSnake].color}
                                                />
                                                <span className="text-[10px] text-gray-500 mt-2 font-mono">戰力分析</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 切換按鈕 */}
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={prevSnake} className="p-4 rounded-full border border-white/20 hover:bg-white/10 hover:scale-110 transition-all">
                                            <ChevronLeft size={24} />
                                        </button>
                                        <button onClick={nextSnake} className="p-4 rounded-full border border-white/20 hover:bg-white/10 hover:scale-110 transition-all">
                                            <ChevronRight size={24} />
                                        </button>
                                    </div>
                                </ScrollReveal>

                                {/* 右側：視覺 (Card / Illustration) */}
                                <ScrollReveal className="w-full md:w-5/12 aspect-square relative order-1 md:order-2" delay={0.2}>
                                    <div key={currentSnake} className="card-enter w-full h-full relative group">
                                        {/* 如果有圖層資料就顯示視差卡片，否則顯示舊的 SVG */}
                                        {snakes[currentSnake].layers ? (
                                            <ParallaxCard layers={snakes[currentSnake].layers} />
                                        ) : (
                                            <div className="w-full h-full bg-[#1A1C23] rounded-[2rem] p-6 shadow-2xl border border-white/10 relative overflow-hidden">
                                                <div className="absolute inset-4 border border-white/5 rounded-[1.5rem] pointer-events-none z-20"></div>
                                                <HabitatIllustration color={snakes[currentSnake].color} index={currentSnake} />
                                            </div>
                                        )}
                                    </div>
                                </ScrollReveal>
                            </div>
                        </div>
                    </section>

                    {/* 3. Product: Snake Ruler (Redesigned) */}
                    <section id="section-ruler" className="product-section min-h-screen flex items-center justify-center py-20 relative border-t border-white/5 overflow-x-auto">
                        <ScrollReveal className="w-full">
                            <SnakeRulerEssential
                                currentSnake={snakes[currentSnake]}
                                snakes={snakes}
                                onSwitchSnake={setCurrentSnake}
                            />
                        </ScrollReveal>
                    </section>

                    {/* 4. Product: Story Book (3D Interactive) */}
                    <BookSection />

                    {/* 5. Product: AR & Puzzle */}
                    <section id="section-ar" className="product-section min-h-[80vh] flex items-center justify-center py-20 relative border-t border-white/5">
                        <div className="container mx-auto px-6 flex flex-col md:flex-row items-center justify-center gap-10">
                            {/* AR */}
                            <ScrollReveal className="bg-[#1A1C23] p-8 rounded-[2rem] border border-white/10 flex flex-col items-center">
                                <ARPhoneGraphic />
                                <h4 className="text-xl font-bold text-white mt-6 mb-2">AR 探索</h4>
                                <p className="text-gray-500 text-sm">掃描森林，發現隱藏的蛇類</p>
                            </ScrollReveal>
                            {/* Puzzle */}
                            <ScrollReveal className="bg-[#1A1C23] p-8 rounded-[2rem] border border-white/10 flex flex-col items-center" id="section-puzzle" delay={0.2}>
                                <PuzzleGraphic />
                                <h4 className="text-xl font-bold text-white mt-6 mb-2">生態拼圖</h4>
                                <p className="text-gray-500 text-sm">拼湊棲地，了解生態系</p>
                            </ScrollReveal>
                        </div>
                    </section>

                    {/* 6. APP Download (Forest Translator) */}
                    <AppDownloadSection />

                    {/* 7. Vision Section (Conclusion) */}
                    <VisionSection />

                    {/* 8. Footer (Info) */}
                    <FooterSection />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>

</html>
